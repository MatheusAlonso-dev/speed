<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <div id="container" class="container">
        <div class="camada camada7"></div> <!-- fundo -->
        <div class="camada camada6"></div>
        <div class="camada camada5"></div> 
        <div class="camada camada4"></div> <!-- predios -->
        <div class="camada camada3"></div> <!-- naves -->
        <div class="camada camada2"></div> <!-- predio -->
        <div class="camada camada1"></div> <!-- ponte -->
        <div id="personagem" class="personagem personagemDescer"><img id="personagemImg" src="img/personagem.png" alt=""></div>
        <div id="camada0" class="camada camada0"></div>
        <div class="camada-1">
            <h1>LEVEL <span id="nivel"></span></h1>
            <h1>SCORE <span id="pontuacao"></span></h1>
            <div id="vida1" class="vida vida1"></div>
            <div id="vida2" class="vida vida2"></div>
        </div>
        
    </div>
</div>

<div id="camada-2" class="camada camadaGameOver camada-2">
    <div class="painelGameOver">
        <h1>SCORE <span id="scoreGameOver"></span></h1>
        <h1>NIVEL <span id="nivelGameOver"></span></h1>
    </div>
</div>
<div id="camada-3" class="camada camadaGameOver camada-3">
    <div id="retry" class="botaoGameOver retry" onclick="retry()"></div>
    <a href="index.html">
        <div id="mainMenu" class="botaoGameOver mainMenu"></div>
    </a>
</div>

    <script src="script.js"></script>
    
</body>
</html>
